name: Jules AI Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: jules-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute PR diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff "origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}" > "${RUNNER_TEMP}/pr.diff"
          echo "Diff size: $(wc -l < "${RUNNER_TEMP}/pr.diff") lines"

      - name: Run Jules review
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          DIFF_FILE: ${{ runner.temp }}/pr.diff
        run: node .github/scripts/jules-review.js
